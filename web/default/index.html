<!doctype html>
<html lang="en" data-product="origingame">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Origin Gateway</title>
    <meta name="title" content="Origin Gateway" />
    <meta
      name="description"
      content="Origin Gateway — unified AI API gateway, accounts, quota, and admin console."
    />
    <meta property="og:title" content="Origin Gateway" />
    <meta
      property="og:description"
      content="Origin Gateway — unified AI API gateway, accounts, quota, and admin console."
    />
    <meta name="twitter:title" content="Origin Gateway" />
    <meta
      name="twitter:description"
      content="Origin Gateway — unified AI API gateway, accounts, quota, and admin console."
    />

    <meta name="theme-color" content="#f4efe4" />
    <!--umami-->
    <!--Google Analytics-->
    <!-- FOUC: apply resolved light/dark color scheme before paint. -->
    <script>
      ;(function () {
        try {
          var root = document.documentElement
          root.setAttribute('data-product', 'origingame')
          var theme = 'system'
          try {
            var stored = localStorage.getItem('yb-ui-theme')
            if (
              stored === 'light' ||
              stored === 'dark' ||
              stored === 'system'
            ) {
              theme = stored
            }
          } catch (e) {}
          var dark = false
          if (theme === 'dark') dark = true
          else if (theme === 'system') {
            dark =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
          }
          root.classList.remove('light', 'dark')
          root.classList.add(dark ? 'dark' : 'light')
          root.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.classList.add('light')
        }
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>

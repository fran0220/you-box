# Origin Gateway Docker Compose
#
# Quick Start:
#   1. cp .env.example .env  # set secrets
#   2. docker compose up -d
#   3. Access at http://localhost:3000
#
# Image: GATEWAY_IMAGE (preferred). BOXAI_IMAGE is accepted as a one-release
# fallback for existing host .env files.
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line
#   2. Uncomment the mysql service and SQL_DSN
#   3. Uncomment mysql in depends_on
#   4. Uncomment mysql_data in volumes section
#
# ⚠️  IMPORTANT: Create a local .env file with strong secrets before deploying to production.

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${GATEWAY_IMAGE:-${BOXAI_IMAGE:-origin-gateway:local}}
    container_name: origin-gateway
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-new-api}
#      - SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET in .env}
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - GLOBAL_WEB_RATE_LIMIT=${GLOBAL_WEB_RATE_LIMIT:-1000}
      - GLOBAL_WEB_RATE_LIMIT_DURATION=${GLOBAL_WEB_RATE_LIMIT_DURATION:-60}
      - NODE_NAME=${NODE_NAME:-origin-gateway-1}  # 节点名称，用于审计日志中标识节点身份
      - PRODUCT_ID=${PRODUCT_ID:-origingame}  # origingame (default) | youbox (local Circuit demo only)
      - MESHY_WEBHOOK_SECRET=${MESHY_WEBHOOK_SECRET:-}  # enables POST /meshy-webhook/:secret when set
#      - STREAMING_TIMEOUT=300
#      - RELAY_IDLE_CONN_TIMEOUT=90
#      - SESSION_SECRET=random_string
#      - SYNC_FREQUENCY=60
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js

    depends_on:
      - redis
      - postgres
#      - mysql  # Uncomment if using MySQL
    networks:
      - origin-gateway-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    networks:
      - origin-gateway-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-new-api}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - origin-gateway-network
#    ports:
#      - "5432:5432"

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - origin-gateway-network
#    ports:
#      - "3306:3306"

volumes:
  pg_data:
#  mysql_data:

networks:
  origin-gateway-network:
    driver: bridge

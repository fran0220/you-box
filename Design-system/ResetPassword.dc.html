<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/youbox-design-system-6d62a15a-e879-41b4-932e-756e7ab712b8/tokens/fonts.css">
<link rel="stylesheet" href="_ds/youbox-design-system-6d62a15a-e879-41b4-932e-756e7ab712b8/styles.css">
<script src="_ds/youbox-design-system-6d62a15a-e879-41b4-932e-756e7ab712b8/_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body{margin:0;background:var(--bg)}
  a{text-decoration:none;color:inherit}
  .mono{font-family:var(--font-mono)}
  .yb-input-wrap span.yb-ic-l{position:absolute;left:12px;top:0;bottom:0;display:flex;align-items:center;pointer-events:none}
  .yb-input-wrap span.yb-ic-l svg{position:static}
  *,*::before,*::after{transition:none!important;animation:none!important}
</style>
</helmet>
<div data-theme="{{ theme }}" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text);font-family:var(--font-sans);padding:32px;position:relative;overflow:hidden">
  <div style="position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:600px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.045),transparent 65%);pointer-events:none"></div>
  <div style="width:100%;max-width:400px;position:relative">
    <a href="Index.dc.html" style="display:flex;align-items:center;justify-content:center;gap:9px;font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.02em;margin-bottom:28px"><span style="display:inline-flex;width:28px;height:28px;border-radius:7px;background:var(--brand);color:var(--brand-on);align-items:center;justify-content:center"><i data-lucide="box" style="width:17px;height:17px"></i></span><span style="color:var(--text-secondary)">You<b style="color:var(--text-strong)">Box</b></span></a>
    <div class="yb-card yb-card--pad-lg">
      <span style="width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--brand-subtle);color:var(--brand);margin-bottom:18px"><i data-lucide="lock-keyhole" style="width:22px;height:22px"></i></span>
      <h1 style="font-family:var(--font-display);font-size:24px;letter-spacing:-.02em;font-weight:700;margin:0 0 8px;color:var(--text-strong)">Set a new password</h1>
      <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;margin:0 0 22px">Choose a strong password for <span class="mono" style="color:var(--text)">dev@acme.io</span>. You'll be signed in after.</p>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="yb-field"><label class="yb-field__label">New password</label><div class="yb-input-wrap"><span class="yb-ic-l"><i data-lucide="lock"></i></span><input class="yb-input yb-input--with-icon" type="password" value="newstrongpass1"></div>
          <div style="display:flex;gap:5px;margin-top:8px"><span style="flex:1;height:4px;border-radius:999px;background:var(--ink-200)"></span><span style="flex:1;height:4px;border-radius:999px;background:var(--ink-200)"></span><span style="flex:1;height:4px;border-radius:999px;background:var(--ink-200)"></span><span style="flex:1;height:4px;border-radius:999px;background:var(--surface-3)"></span></div></div>
        <div class="yb-field"><label class="yb-field__label">Confirm password</label><div class="yb-input-wrap"><span class="yb-ic-l"><i data-lucide="lock"></i></span><input class="yb-input yb-input--with-icon" type="password" value="newstrongpass1"></div></div>
        <a class="yb-btn yb-btn--primary yb-btn--lg yb-btn--block" href="Dashboard.dc.html"><span>Reset password</span><i data-lucide="check"></i></a>
      </div>
      <div style="margin-top:18px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-secondary)"><i data-lucide="check" style="width:14px;height:14px;color:var(--success)"></i>At least 12 characters</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-secondary)"><i data-lucide="check" style="width:14px;height:14px;color:var(--success)"></i>Mix of letters and numbers</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-muted)"><i data-lucide="circle" style="width:14px;height:14px;color:var(--text-faint)"></i>Add a symbol for an extra-strong score</div>
      </div>
    </div>
    <a href="SignIn.dc.html" style="display:flex;align-items:center;justify-content:center;gap:7px;margin-top:22px;font-size:13px;color:var(--text-secondary)"><i data-lucide="arrow-left" style="width:15px;height:15px"></i>Back to sign in</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:760},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}">
class Component extends DCLogic {
  componentDidMount() { this._icons(); }
  componentDidUpdate() { this._icons(); }
  _icons() { const run = () => { if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': 1.75 } }); }; run(); setTimeout(run, 250); setTimeout(run, 700); }
  renderVals() { return { theme: this.props.theme === 'light' ? 'light' : 'dark' }; }
}
</script>
</body>
</html>
